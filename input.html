<!-- PAGE 2 BTW (COLE) --> 
<head>
  <title>Talk Back: Setup</title>
  <link rel="stylesheet" href="format.css">
  <!--<link rel="icon" type="images/photo.png" href="images/photo.png">-->
</head>

<body>
    <button class="back-button" onclick="goBack()">← Back</button>
    <!--<button class="flashbang-button" onclick="flashbang()">Flashbang</button>-->
    
    <text>
        <h1>Setup</h1>
        <h3>Please enter the words that you would like to avoid using and the words you would like to use more.</h3>
    
        <div class="doble-gird">
            <div>
                <h2>Words to avoid</h2>
                <input id="avoid1">
                <input id="avoid2">
                <input id="avoid3">
                <input id="avoid4">
                <input id="avoid5">
            </div>
            <div>
                <h2>Words to include</h2>
                <input id="include1">
                <input id="include2">
                <input id="include3">
                <input id="include4">
                <input id="include5">
            </div>
        </div>
    
    
        <h3>Not all fields need to be filled in.</h3>
        <button onclick="resetWords()">Reset</button>
        <button onclick="recording()">Next</button>
        
    </text>

    <script>
        function goBack() {
            saveWords();
            window.location.href = "home.html";
        }
        function flashbang() {
            saveWords();
            window.location.href = "flashbang.html";
        }
        function recording() {
            saveWords();
            window.location.href = "recording.html";
        }
        function resetWords() {
            const avoid1 = document.getElementById("avoid1");
            const avoid2 = document.getElementById("avoid2");
            const avoid3 = document.getElementById("avoid3");
            const avoid4 = document.getElementById("avoid4");
            const avoid5 = document.getElementById("avoid5");
            const include1 = document.getElementById("include1");
            const include2 = document.getElementById("include2");
            const include3 = document.getElementById("include3");
            const include4 = document.getElementById("include4");
            const include5 = document.getElementById("include5");

            avoid1.value = "";
            avoid2.value = "";
            avoid3.value = "";
            avoid4.value = "";
            avoid5.value = "";
            include1.value = "";
            include2.value = "";
            include3.value = "";
            include4.value = "";
            include5.value = "";
        }
        function saveWords() {
            const avoidWords = [
                document.getElementById("avoid1").value,
                document.getElementById("avoid2").value,
                document.getElementById("avoid3").value,
                document.getElementById("avoid4").value,
                document.getElementById("avoid5").value
            ];

            const includeWords = [
                document.getElementById("include1").value,
                document.getElementById("include2").value,
                document.getElementById("include3").value,
                document.getElementById("include4").value,
                document.getElementById("include5").value
            ];

            const avoidCount = avoidWords.filter(word => word.trim() !== "").length;
            const includeCount = includeWords.filter(word => word.trim() !== "").length;

            const words = {
                avoid1: avoidWords[0],
                avoid2: avoidWords[1],
                avoid3: avoidWords[2],
                avoid4: avoidWords[3],
                avoid5: avoidWords[4],
                include1: includeWords[0],
                include2: includeWords[1],
                include3: includeWords[2],
                include4: includeWords[3],
                include5: includeWords[4],
                avoidCount: avoidCount,
                includeCount: includeCount
            };

            localStorage.setItem("savedWords", JSON.stringify(words));
        }

        loadWords();
    </script>
</body>
